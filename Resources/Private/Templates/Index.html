<f:layout name="Backend" />

<f:section name="Content">
    <f:flashMessages />
    <div class="module-alice">
        
        <f:render partial="Layout/Header" arguments="{_all}" />

        <div id="alice-results-container" class="{f:if(condition: '{analysis} && !{isSiteRoot}', else: 'hidden')}"
             data-analyze-uri="{analyzeUri}"
             data-get-pages-uri="{getPagesUri}"
             data-save-settings-uri="{saveSettingsUri}"
             data-labels-good="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:status.good')}"
             data-labels-med="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:status.med')}"
             data-labels-poor="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:status.poor')}"
             data-labels-ok="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:audit.seo_ok')}"
             data-labels-measuring="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:status.measuring')}"
             data-labels-waiting="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:status.waiting_interaction')}"
             data-labels-captured="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:status.captured')}"
             data-labels-alt="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:label.alt')}"
             data-labels-dimensions="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:label.dimensions')}"
             data-labels-unset="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:label.unset')}"
             data-labels-loading="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:label.loading')}"
             data-labels-loading-eager="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:label.loading_eager')}"
             data-labels-loading-lazy="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:label.loading_lazy')}"
             data-labels-path="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:label.path')}"
             data-labels-internal="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:label.internal')}"
             data-labels-external="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:label.external')}"
             data-labels-text="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:label.text')}"
             data-labels-time="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:label.load_time')}"
             data-labels-no-links="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:label.no_links')}"
             data-error-timeout="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:error.timeout')}"
             data-error-access="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:error.access_denied')}"
             data-error-network="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:error.network')}"
             data-error-selection="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:error.selection')}"
             data-error-route="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:error.route_missing')}"
             data-error-unknown="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:error.unknown_server')}"
             data-labels-inventory="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:label.meta_inventory')}"
             data-seo-missing-title="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:error.missing_title')}"
             data-seo-missing-description="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:error.missing_description')}"
             data-seo-missing-keywords="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:error.missing_keywords')}"
             data-seo-missing-robots="{f:translate(key: 'LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:error.missing_robots')}">
            
            <f:render partial="Audit/SummaryCards" arguments="{_all}" />
            <f:render partial="Audit/DetailAccordion" arguments="{_all}" />
        </div>

        <div id="no-analysis-message" class="{f:if(condition: '{analysis} || {isSiteRoot}', then: 'hidden')}">
            <f:if condition="{siteFound}">
                <f:then>
                    <div class="alice-empty-state">
                        <i class="alice-icon alice-icon-chart"></i>
                        <p><f:translate key="LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:label.no_data" /></p>
                    </div>
                </f:then>
                <f:else>
                    <div class="alice-empty-state">
                        <i class="alice-icon alice-icon-warning"></i>
                        <p><f:translate key="LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:error.no_site_found" /></p>
                        <p class="alice-hint"><f:translate key="LLL:EXT:alice/Resources/Private/Language/locallang_mod.xlf:hint.select_page" /></p>
                    </div>
                </f:else>
            </f:if>
        </div>

        <!-- Site Configuration View -->
        <f:if condition="{isSiteRoot}">
            <div class="alice-settings-container">
                <f:render partial="Dashboard/GlobalSettings" arguments="{_all}" />
                <f:render partial="Overlay/GlobalProgressBar" arguments="{_all}" />
                <f:render partial="Dashboard/PagesTable" arguments="{sitePages: sitePages, settings: settings}" />
                <f:render partial="Dashboard/IssuesTable" arguments="{_all}" />
            </div>
        </f:if>

        <f:render partial="Overlay/ProgressLoader" arguments="{_all}" />

        <!-- Background measurement iframe -->
        <iframe id="alice-analyzer-iframe" src="about:blank"></iframe>
    </div>
</f:section>
